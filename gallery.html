<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Foto</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; }
        nav { background: #2c3e50; padding: 1rem; text-align: center; }
        nav a { color: white; text-decoration: none; margin: 0 15px; }
        .container { width: 85%; margin: 30px auto; text-align: center; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .gallery img { width: 100%; border-radius: 8px; transition: transform 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .gallery img:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="biodata.html">Biodata</a>
        <a href="gallery-foto.html">Foto</a>
        <a href="gallery-video.html">Video</a>
    </nav>

    <div class="container">
        <h2>Koleksi Foto</h2>
        <div class="gallery">
            <img src="https://via.placeholder.com/400x300" alt="Foto 1">
            <img src="https://via.placeholder.com/400x300" alt="Foto 2">
            <img src="https://via.placeholder.com/400x300" alt="Foto 3">
            <img src="https://via.placeholder.com/400x300" alt="Foto 4">
        </div>
    </div>
</body>
</html>
