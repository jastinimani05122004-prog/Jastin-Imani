<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Data Keuangan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding: 20px; }
        .form-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .section-title { border-left: 5px solid #0d6efd; padding-left: 10px; margin-bottom: 20px; color: #0d6efd; }
    </style>
</head>
<body>

<div class="container">
    <div class="form-container mx-auto" style="max-width: 800px;">
        <h2 class="text-center mb-4">Formulir Data & Transaksi</h2>
        
        <form id="financeForm">
            <h4 class="section-title">Data Demografi</h4>
            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label class="form-label">Nama Lengkap</label>
                    <input type="text" name="nama" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Tanggal Lahir</label>
                    <input type="date" name="tgl_lahir" class="form-control" required>
                </div>
                <div class="col-12">
                    <label class="form-label">Alamat</label>
                    <textarea name="alamat" class="form-control" rows="2"></textarea>
                </div>
                <div class="col-md-6">
                    <label class="form-label">No. Telepon</label>
                    <input type="tel" name="telepon" class="form-control" placeholder="0812...">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="col-md-12">
                    <label class="form-label">Pendidikan Terakhir (Cari/Pilih)</label>
                    <input list="listPendidikan" name="pendidikan" class="form-control" placeholder="Ketik untuk mencari...">
                    <datalist id="listPendidikan">
                        <option value="SMA/SMK">
                        <option value="Diploma (D3)">
                        <option value="Sarjana (S1)">
                        <option value="Magister (S2)">
                        <option value="Doktor (S3)">
                    </datalist>
                </div>
            </div>

            <h4 class="section-title">Data Bank</h4>
            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label class="form-label">Nama Bank</label>
                    <input list="listBank" name="nama_bank" class="form-control" placeholder="Pilih Bank...">
                    <datalist id="listBank">
                        <option value="Bank BCA">
                        <option value="Bank Mandiri">
                        <option value="Bank BNI">
                        <option value="Bank BRI">
                        <option value="Bank Syariah Indonesia">
                    </datalist>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Nomor Rekening</label>
                    <input type="number" name="no_rekening" class="form-control">
                </div>
            </div>

            <h4 class="section-title">Data Transaksi Keuangan</h4>
            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label class="form-label">Tanggal Transaksi</label>
                    <input type="date" name="tgl_transaksi" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Jenis Transaksi</label>
                    <div class="btn-group w-100" role="group">
                        <input type="radio" class="btn-check" name="jenis_transaksi" id="tj1" value="Pemasukan" checked>
                        <label class="btn btn-outline-primary" for="tj1">Pemasukan</label>
                        <input type="radio" class="btn-check" name="jenis_transaksi" id="tj2" value="Pengeluaran">
                        <label class="btn btn-outline-primary" for="tj2">Pengeluaran</label>
                    </div>
                </div>
                <div class="col-12">
                    <label class="form-label">Uraian Transaksi</label>
                    <input type="text" name="uraian" class="form-control" placeholder="Contoh: Gaji Bulanan">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Debet (Rp)</label>
                    <input type="number" name="debet" class="form-control" value="0">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Kredit (Rp)</label>
                    <input type="number" name="kredit" class="form-control" value="0">
                </div>
            </div>

            <button type="submit" id="submitBtn" class="btn btn-primary btn-lg w-100">Kirim Data</button>
        </form>
    </div>
</div>

<script>
    const scriptURL = 'URL_WEB_APP_ANDA_DISINI' // Ganti dengan URL dari Google Apps Script
    const form = document.getElementById('financeForm')
    const btn = document.getElementById('submitBtn')

    form.addEventListener('submit', e => {
        e.preventDefault()
        btn.disabled = true
        btn.innerHTML = "Mengirim..."
        
        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                alert("Data berhasil dikirim ke Google Sheets!")
                btn.disabled = false
                btn.innerHTML = "Kirim Data"
                form.reset()
            })
            .catch(error => {
                console.error('Error!', error.message)
                alert("Terjadi kesalahan saat mengirim data.")
                btn.disabled = false
            })
    })
</script>

</body>
</html>
