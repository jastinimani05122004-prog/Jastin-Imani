<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Pendataan Terintegrasi</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { color: #333; border-bottom: 2px solid #007bff; padding-bottom: 10px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; }
        input[type="text"], input[type="date"], input[type="email"], input[type="tel"], input[type="number"], select, textarea {
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-family: inherit;
        }
        /* Styling untuk Radio Buttons agar terlihat seperti tombol biasa */
        .radio-btn-group { display: flex; gap: 10px; }
        .radio-btn-group input[type="radio"] { display: none; }
        .radio-btn-group label {
            flex: 1; text-align: center; padding: 10px; background-color: #e9ecef; border: 1px solid #ccc; 
            border-radius: 4px; cursor: pointer; transition: background-color 0.3s; font-weight: normal; margin: 0;
        }
        .radio-btn-group input[type="radio"]:checked + label { background-color: #007bff; color: white; border-color: #007bff; font-weight: bold; }
        
        button[type="submit"] { background-color: #28a745; color: white; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; margin-top: 20px;}
        button[type="submit"]:hover { background-color: #218838; }
        #loading { display: none; text-align: center; color: #007bff; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <form id="dataForm">
        
        <h2>1. Data Demografi</h2>
        <div class="form-group">
            <label>Nama Pengguna</label>
            <input type="text" name="nama" required placeholder="Masukkan nama lengkap">
        </div>
        <div class="form-group">
            <label>Tanggal Lahir</label>
            <input type="date" name="tgl_lahir" required>
        </div>
        <div class="form-group">
            <label>Alamat</label>
            <textarea name="alamat" rows="3" required placeholder="Masukkan alamat lengkap"></textarea>
        </div>
        <div class="form-group">
            <label>No Telepon</label>
            <input type="tel" name="telepon" required placeholder="Contoh: 081234567890">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required placeholder="email@contoh.com">
        </div>
        <div class="form-group">
            <label>Pendidikan (Pilih atau Ketik untuk Mencari)</label>
            <input list="daftarPendidikan" name="pendidikan" required placeholder="Pilih/Ketik tingkat pendidikan">
            <datalist id="daftarPendidikan">
                <option value="SD / Sederajat">
                <option value="SMP / Sederajat">
                <option value="SMA / Sederajat">
                <option value="D3 - Diploma">
                <option value="S1 - Sarjana">
                <option value="S2 - Magister">
                <option value="S3 - Doktor">
            </datalist>
        </div>

        <h2>2. Data Bank</h2>
        <div class="form-group">
            <label>Nama Bank (Pilih atau Ketik untuk Mencari)</label>
            <input list="daftarBank" name="bank" required placeholder="Pilih/Ketik nama bank">
            <datalist id="daftarBank">
                <option value="Bank Mandiri">
                <option value="Bank BCA">
                <option value="Bank BRI">
                <option value="Bank BNI">
                <option value="Bank Syariah Indonesia (BSI)">
                <option value="Bank CIMB Niaga">
                <option value="Bank Permata">
                <option value="Bank Jago">
                <option value="SeaBank">
            </datalist>
        </div>
        <div class="form-group">
            <label>Nomor Rekening</label>
            <input type="number" name="rekening" required placeholder="Masukkan nomor rekening">
        </div>

        <h2>3. Data Transaksi Keuangan</h2>
        <div class="form-group">
            <label>Tanggal Transaksi</label>
            <input type="date" name="tgl_transaksi" required>
        </div>
        <div class="form-group">
            <label>Uraian Transaksi</label>
            <input type="text" name="uraian" required placeholder="Contoh: Pembayaran listrik bulanan">
        </div>
        <div class="form-group">
            <label>Jenis Transaksi (Pilih salah satu)</label>
            <div class="radio-btn-group">
                <input type="radio" id="jenis_pengeluaran" name="jenis_transaksi" value="Pengeluaran" required>
                <label for="jenis_pengeluaran">Pengeluaran</label>

                <input type="radio" id="jenis_pemasukan" name="jenis_transaksi" value="Pemasukan" required>
                <label for="jenis_pemasukan">Pemasukan</label>
                
                <input type="radio" id="jenis_transfer" name="jenis_transaksi" value="Transfer Internal" required>
                <label for="jenis_transfer">Transfer Internal</label>
            </div>
        </div>
        <div class="form-group">
            <label>Nominal Debet (Rp)</label>
            <input type="number" name="debet" value="0" min="0" required>
        </div>
        <div class="form-group">
            <label>Nominal Kredit (Rp)</label>
            <input type="number" name="kredit" value="0" min="0" required>
        </div>

        <button type="submit" id="submitBtn">Simpan Data Transaksi</button>
        <div id="loading">Memproses data... Harap tunggu.</div>
    </form>
</div>

<script>
    // GANTI URL DI BAWAH INI DENGAN URL WEB APP GOOGLE APPS SCRIPT ANDA
    const scriptURL = 'URL_WEB_APP_ANDA_DISINI'; 
    const form = document.getElementById('dataForm');
    const submitBtn = document.getElementById('submitBtn');
    const loading = document.getElementById('loading');

    form.addEventListener('submit', e => {
        e.preventDefault(); // Mencegah halaman ter-refresh
        
        // Menampilkan UI loading
        submitBtn.style.display = 'none';
        loading.style.display = 'block';

        // Mengirim data menggunakan API Fetch Javascript
        fetch(scriptURL, { 
            method: 'POST', 
            body: new FormData(form),
            mode: 'no-cors' // Penting untuk mengirim POST ke Google Apps Script tanpa error CORS
        })
        .then(response => {
            alert("Data berhasil disimpan ke Google Sheets!");
            form.reset(); // Mengosongkan form
            submitBtn.style.display = 'block';
            loading.style.display = 'none';
        })
        .catch(error => {
            console.error('Error!', error.message);
            alert("Terjadi kesalahan. Silakan coba lagi.");
            submitBtn.style.display = 'block';
            loading.style.display = 'none';
        });
    });
</script>

</body>
</html>
