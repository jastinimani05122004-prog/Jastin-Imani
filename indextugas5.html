<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Sistem Informasi KUB & Dashboard</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* Variabel CSS Kelompok */
    :root {
      --bg: #f4f7f6;
      --card: #ffffff;
      --primary: #1abc9c;
      --primary-dark: #16a085;
      --sidebar: #2c3e50;
      --sidebar-dark: #1a252f;
      --text: #2d3436;
      --muted: #636e72;
      --line: #e5e7eb;
      --shadow: 0 10px 30px rgba(0,0,0,.08);
      --radius: 18px;
      --sidebar-w: 260px;
      --sidebar-c: 76px;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    
    body {
      font-family: 'Poppins', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(26,188,156,.10), transparent 30%),
        radial-gradient(circle at right top, rgba(52,152,219,.09), transparent 26%),
        var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }
    
    .layout { display: flex; min-height: 100vh; }
    
    /* Tombol Mobile Toggle */
    .mobile-toggle {
      display: none;
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 60;
      width: 46px;
      height: 46px;
      border: none;
      border-radius: 14px;
      background: var(--sidebar-dark);
      color: #fff;
      box-shadow: var(--shadow);
      cursor: pointer;
      align-items: center;
      justify-content: center;
    }
    
    /* Sidebar */
    .sidebar {
      width: var(--sidebar-c);
      background: linear-gradient(180deg, var(--sidebar) 0%, #233140 100%);
      color: #ecf0f1;
      position: fixed;
      inset: 0 auto 0 0;
      z-index: 50;
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: transform .3s ease, width .3s ease;
    }
    
    .sidebar.open,
    .sidebar:hover { width: var(--sidebar-w); }
    
    .brand {
      height: 76px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 18px;
      background: var(--sidebar-dark);
      border-bottom: 1px solid rgba(255,255,255,.08);
      white-space: nowrap;
    }
    
    .brand i { color: var(--primary); font-size: 24px; min-width: 28px; text-align: center; }
    .brand h2 {
      font-size: 16px;
      font-weight: 700;
      opacity: 0;
      transition: .25s ease;
    }
    
    .sidebar.open .brand h2,
    .sidebar:hover .brand h2 { opacity: 1; }
    
    .sidebar-menu { list-style: none; padding: 12px 0; }
    .menu-item { margin: 6px 10px; }
    
    .menu-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px;
      border: none;
      background: transparent;
      color: #cbd5e1;
      cursor: pointer;
      border-radius: 14px;
      transition: .25s ease;
      font: inherit;
      text-align: left;
    }
    
    .menu-toggle i { width: 28px; text-align: center; font-size: 18px; }
    .menu-label { opacity: 0; transition: .25s ease; white-space: nowrap; font-size: 14px; font-weight: 500; }
    
    .sidebar.open .menu-label,
    .sidebar:hover .menu-label { opacity: 1; }
