<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Data & Formulir</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

html {
    scroll-behavior: smooth; /* Memberikan efek scroll yang halus saat navigasi diklik */
}

body {
    background: #f4f6f9;
    color: #333;
}

header {
    background: #0f172a;
    color: white;
    padding: 20px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 1000;
}

header h1 {
    margin-bottom: 10px;
}

nav {
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
}

nav a {
    text-decoration: none;
    color: white;
    padding: 10px 18px;
    border-radius: 8px;
    background: #2563eb;
    transition: 0.3s;
}

nav a:hover {
    background: #1d4ed8;
}

section {
    padding: 30px 20px;
    scroll-margin-top: 100px; /* Jarak aman agar judul tidak tertutup header saat discroll */
}

.container {
    max-width: 1200px;
    margin: auto;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

h2 {
    margin-bottom: 20px;
    color: #0f172a;
    border-bottom: 2px solid #e2e8f0;
    padding-bottom: 10px;
}

iframe {
    width: 100%;
    border: none;
    border-radius: 10px;
}

.form-frame {
    min-height: 1200px; 
}

.sheet-frame {
    min-height: 700px;
}

.looker-frame {
    min-height: 700px;
}

footer {
    text-align: center;
    padding: 20px;
    background: #0f172a;
    color: white;
    margin-top: 30px;
}

@media(max-width: 768px) {
    nav {
        flex-direction: column;
        align-items: center;
    }

    nav a {
        width: 100%;
        text-align: center;
    }

    .form-frame {
        min-height: 1400px;
    }
}
</style>
</head>

<body>

<header>
    <h1>Dashboard Formulir & Data</h1>

    <nav>
        <a href="#form-input">Form Input</a>
        <a href="#form-kepuasan">Tingkat Kepuasan</a>
        <a href="#spreadsheet-1">Sajian Data 1</a>
        <a href="#spreadsheet-2">Sajian Data 2</a>
        <a href="#looker">Looker Studio</a>
    </nav>
</header>

<section id="form-input">
    <div class="container">
        <div class="card">
            <h2>Form Input Data</h2>
            <iframe
                class="form-frame"
                src="https://docs.google.com/forms/d/e/1FAIpQLSeVZubdheqhebKqEkDbxbWSHXL6D9xvFE71tV6MEj99oereew/viewform?embedded=true">
                Memuat…
            </iframe>
        </div>
    </div>
</section>

<section id="form-kepuasan">
    <div class="container">
        <div class="card">
            <h2>Form Tingkat Kepuasan</h2>
            <iframe 
                class="form-frame" 
                src="https://docs.google.com/forms/d/e/1FAIpQLScgxs1JEF_OuoX9NfXU6STwdTfbVMdbA8vu_qw31UuFM_362g/viewform?embedded=true">
                Memuat…
            </iframe>
        </div>
    </div>
</section>

<section id="spreadsheet-1">
    <div class="container">
        <div class="card">
            <h2>Sajian Data Spreadsheet 1</h2>
            <iframe
                class="sheet-frame"
                src="https://docs.google.com/spreadsheets/d/e/2PACX-1vSIAIXP4EsYtGQy64tk63p1SlTeK9VJ4b1ZAh-RNtPny6jSV0wZUIcyOUxo0viO7u9Oh5lfeqa-GsSR/pubhtml?widget=true&amp;headers=false">
            </iframe>
        </div>
    </div>
</section>

<section id="spreadsheet-2">
    <div class="container">
        <div class="card">
            <h2>Sajian Data Spreadsheet 2</h2>
            <iframe 
                class="sheet-frame" 
                src="https://docs.google.com/spreadsheets/d/e/2PACX-1vRF0lyfHes3CcZmc1tuF7umINOuCsBI5lkAzRUTRi6Ma4PAyKFdhP6_Ezpozpv8xmYBhFMajO2dhNO8/pubhtml?widget=true&amp;headers=false">
            </iframe>
        </div>
    </div>
</section>

<section id="looker">
    <div class="container">
        <div class="card">
            <h2>Dashboard Looker Studio</h2>
            <iframe
                class="looker-frame"
                src="https://datastudio.google.com/embed/reporting/d0b5c912-1878-42dd-a155-58da00fec84a/page/page_12345"
                allowfullscreen
                sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox">
            </iframe>
        </div>
    </div>
</section>

<footer>
    © 2026 Dashboard Form, Spreadsheet & Looker Studio
</footer>

</body>
</html>
