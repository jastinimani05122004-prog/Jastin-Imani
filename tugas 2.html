<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Pendataan Terintegrasi</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #007bff; padding-bottom: 10px; color: #333; margin-top: 30px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; }
        input[type="text"], input[type="date"], input[type="email"], input[type="tel"], input[type="number"], select, textarea {
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
        }
        /* Styling untuk Radio Button menjadi Button */
        .radio-button-group { display: flex; gap: 10px; }
        .radio-button-group input[type="radio"] { display: none; }
        .radio-button-group label {
            flex: 1; text-align: center; padding: 10px; background-color: #e9ecef; border: 1px solid #ccc; 
            border-radius: 4px; cursor: pointer; transition: 0.3s; font-weight: normal; margin-bottom: 0;
        }
        .radio-button-group input[type="radio"]:checked + label {
            background-color: #007bff; color: white; border-color: #007bff; font-weight: bold;
        }
        .submit-btn {
            width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; 
            border-radius: 4px; font-size: 16px; cursor: pointer; margin-top: 20px;
        }
        .submit-btn:hover { background-color: #218838; }
        #loading { display: none; text-align: center; color: #007bff; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align: center;">Formulir Data Lengkap</h1>
    <form id="pengumpulanDataForm">

        <h2>Data Demografi</h2>
        <div class="form-group">
            <label>Nama Pengguna</label>
            <input type="text" name="nama" required>
        </div>
        <div class="form-group">
            <label>Tanggal Lahir</label>
            <input type="date" name="tanggal_lahir" required>
        </div>
        <div class="form-group">
            <label>Alamat</label>
            <textarea name="alamat" rows="3" required></textarea>
        </div>
        <div class="form-group">
            <label>No Telepon</label>
            <input type="tel" name="no_telepon" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>Pendidikan (Ketik untuk mencari/Pilih dropdown)</label>
            <input list="pendidikan-list" name="pendidikan" required placeholder="Pilih atau cari pendidikan...">
            <datalist id="pendidikan-list">
                <option value="SD"></option>
                <option value="SMP"></option>
                <option value="SMA/SMK"></option>
                <option value="D3"></option>
                <option value="S1"></option>
                <option value="S2"></option>
                <option value="S3"></option>
            </datalist>
        </div>

        <h2>Data Bank</h2>
        <div class="form-group">
            <label>Nama Bank (Ketik untuk mencari/Pilih dropdown)</label>
            <input list="bank-list" name="nama_bank" required placeholder="Pilih atau cari bank...">
            <datalist id="bank-list">
                <option value="BCA"></option>
                <option value="Bank Mandiri"></option>
                <option value="BNI"></option>
                <option value="BRI"></option>
                <option value="BSI"></option>
                <option value="CIMB Niaga"></option>
                <option value="Permata Bank"></option>
            </datalist>
        </div>
        <div class="form-group">
            <label>Nomor Rekening</label>
            <input type="number" name="no_rekening" required>
        </div>

        <h2>Data Transaksi Keuangan</h2>
        <div class="form-group">
            <label>Tanggal Transaksi</label>
            <input type="date" name="tanggal_transaksi" required>
        </div>
        <div class="form-group">
            <label>Uraian Transaksi</label>
            <input type="text" name="uraian" required>
        </div>
        <div class="form-group">
            <label>Jenis Transaksi</label>
            <div class="radio-button-group">
                <input type="radio" id="jenis_debet" name="jenis_transaksi" value="Debet" required>
                <label for="jenis_debet">Debet</label>
                
                <input type="radio" id="jenis_kredit" name="jenis_transaksi" value="Kredit">
                <label for="jenis_kredit">Kredit</label>
            </div>
        </div>
        <div class="form-group">
            <label>Nominal Debet (Kosongkan jika Kredit)</label>
            <input type="number" name="debet" value="0">
        </div>
        <div class="form-group">
            <label>Nominal Kredit (Kosongkan jika Debet)</label>
            <input type="number" name="kredit" value="0">
        </div>

        <button type="submit" class="submit-btn">Kirim Data</button>
        <p id="loading">Sedang mengirim data ke Google Sheets...</p>
    </form>
</div>

<script>
    // MASUKKAN URL WEB APP GOOGLE SCRIPT ANDA DI BAWAH INI
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwabQTMeyjCOPJaOBX7oMQcN2fimIMuLRhT8YZOgO3ZxqjWSV2H7jct-Q6ygYk1vqV7/exec';
    const form = document.forms['pengumpulanDataForm'];
    const loadingText = document.getElementById('loading');
    const submitBtn = document.querySelector('.submit-btn');

    form.addEventListener('submit', e => {
        e.preventDefault(); // Mencegah reload halaman
        loadingText.style.display = 'block';
        submitBtn.disabled = true;

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                loadingText.style.display = 'none';
                submitBtn.disabled = false;
                alert('Data berhasil disimpan ke Google Sheets!');
                form.reset(); // Mengosongkan form setelah berhasil
            })
            .catch(error => {
                loadingText.style.display = 'none';
                submitBtn.disabled = false;
                alert('Terjadi kesalahan! Gagal mengirim data.');
                console.error('Error!', error.message);
            });
    });
</script>

</body>
</html>
